<!doctype html>
<html>
  <head>
    <title>Taxes | Hustle Theory</title>
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body class="module-page">
    <!-- Smart Owl Mascot -->
    <div class="mascot bottom-right" onclick="mascotSpeak()">
      <div class="mascot-icon">🦉</div>
    </div>
    <div class="container">
      <div class="progress">
        <div class="progress-bar" id="lessonProgress"></div>
      </div>
      <div id="lessonContent">
        <h1>🧾 Taxes</h1>
        <p>
          Taxes are mandatory payments made to the government by individuals and
          businesses. The government uses tax money to build roads, run schools,
          hospitals, and provide public services.
        </p>
        <p
          style="
            background: #ffe4ff;
            padding: 15px;
            border-radius: 10px;
            color: #4a148c;
            font-weight: bold;
          "
        >
          💡 Understanding taxes helps you plan finances better!
        </p>
        <div
          style="
            background: #f0e6ff;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            border: 3px solid #da70d6;
          "
        >
          <h3 style="color: #9932cc">💰 Tax Calculator 🎮</h3>
          <p>
            Your annual income:
            <input
              type="number"
              id="income2"
              placeholder="e.g., 500000"
              style="
                width: 120px;
                padding: 5px;
                border: 2px solid #da70d6;
                border-radius: 5px;
              "
            />
          </p>
          <button
            onclick="calculateTax()"
            style="
              background: #da70d6;
              color: white;
              border: 2px solid #9932cc;
              padding: 8px 15px;
              border-radius: 8px;
              font-weight: bold;
              cursor: pointer;
            "
          >
            Calculate Tax!
          </button>
          <p
            id="taxResult"
            style="
              color: #9932cc;
              font-size: 16px;
              font-weight: bold;
              background: #ffe4ff;
              padding: 10px;
              border-radius: 8px;
            "
          ></p>
        </div>
        <button onclick="nextStep()" style="margin-top: 20px">
          Continue Lesson →
        </button>
      </div>
    </div>
    <script src="../assets/js/module4.js"></script>
    <script>
      function calculateTax() {
        const income = parseFloat(document.getElementById('income2').value);
        
        if (isNaN(income) || income < 0) {
          document.getElementById('taxResult').innerHTML = '❌ Please enter valid income!';
          return;
        }
        
        let tax = 0;
        // Simplified Indian tax slab
        if (income > 1000000) {
          tax = (income - 1000000) * 0.30 + 1000000 * 0.20;
        } else if (income > 500000) {
          tax = (income - 500000) * 0.20 + 500000 * 0.10;
        } else if (income > 250000) {
          tax = (income - 250000) * 0.10;
        }
        
        const afterTax = income - tax;
        document.getElementById('taxResult').innerHTML = 
          `💰 Income: ₹${income}<br>💸 Tax to pay: ₹${tax.toFixed(2)}<br>🎉 You keep: ₹${afterTax.toFixed(2)}`;
      }

      function mascotSpeak() {
        const messages = [
          "Taxes fund amazing public services! 🏛️",
          "Understanding taxes is adult knowledge! 🎓",
          "Government needs everyone's help! 🤝",
          "Smart citizens understand taxes! 🧠",
          "You're becoming tax savvy! 🌟",
        ];
        alert(messages[Math.floor(Math.random() * messages.length)]);
      }
    </script>
  </body>
</html>
