<!doctype html>
<html>
  <head>
    <title>Login / Sign Up | Hustle Theory</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body class="auth-page">
    <!-- Smart Owl Mascot -->
    <div class="mascot" style="top: 30px; left: 30px" onclick="mascotSpeak()">
      <div class="mascot-icon">🦉</div>
    </div>

    <div class="auth-box">
      <div id="loginView" class="auth-view active">
        <h1>Hustle Theory</h1>
        <p>Login to start your learning journey</p>
        <form
          onsubmit="
            login();
            return false;
          "
        >
          <input type="text" id="loginUser" placeholder="Username" />
          <input type="password" id="loginPass" placeholder="Password" />
          <button type="submit">Login</button>
        </form>
        <div class="auth-link">
          <a href="#" onclick="showSignup()">Create Account</a>
        </div>
      </div>
      <div id="signupView" class="auth-view">
        <h1>Create Account</h1>
        <input type="text" id="signupUser" placeholder="Username" />
        <input type="password" id="signupPass" placeholder="Password" />
        <button onclick="createAccount()">Sign Up</button>
        <div class="auth-link">
          Already have an account? <a href="#" onclick="showLogin()">Login</a>
        </div>
      </div>
    </div>
    <script src="assets/js/auth.js"></script>
    <script>
      function mascotSpeak() {
        const messages = [
          "Welcome! Let's learn about money! 💰",
          "Create an account to get started! 🚀",
          "Financial knowledge is power! 💪",
          "Let's make smart choices! 💡",
          "Ready to hustle? 🌟"
        ];
        alert(messages[Math.floor(Math.random() * messages.length)]);
      }
    </script>
  </body>
</html>
